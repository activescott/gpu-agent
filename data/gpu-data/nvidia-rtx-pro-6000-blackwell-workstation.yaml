summary: |
  The NVIDIA RTX PRO 6000 Blackwell Workstation Edition is the flagship of the NVIDIA RTX PRO Blackwell
  professional workstation GPU family, announced at GTC25 Spring on March 18, 2025, and available
  in April 2025 through distribution partners. It succeeds the RTX 6000 Ada Generation and represents
  a substantial generational leap: double the CUDA cores (24,064 vs 12,288 on Ada), double the
  memory capacity (96 GB vs 48 GB), and double the TDP (600 W vs 300 W).

  Built on the NVIDIA Blackwell architecture using a full-configuration GB202 die (TSMC 4nm process,
  92.2 billion transistors, ~750 mm2 die area), the RTX PRO 6000 Blackwell Workstation Edition
  features 24,064 CUDA cores across 188 streaming multiprocessors, 752 fifth-generation Tensor Cores,
  and 188 fourth-generation RT Cores. With 188 of 192 SMs enabled, it is the highest-core-count
  GB202-based product shipping, surpassing the consumer GeForce RTX 5090 which enables 170 of 192 SMs
  (21,760 CUDA cores). It delivers 96 GB GDDR7 ECC memory on a 512-bit memory bus providing
  1,792 GB/s bandwidth, compared to the RTX 5090's 32 GB on a 512-bit bus. The 5th-generation Tensor Cores support FP4
  and FP8 precisions alongside BF16, TF32, FP16, INT8, and INT4, delivering 4,000 AI TOPS (FP4
  with sparsity) and 125 TFLOPS of FP32 compute.

  The card uses NVIDIA's Double Flow Through active thermal design with dual fans in a dual-slot,
  full-height form factor (5.4 in H x 12.0 in L) and requires a single 16-pin PCIe CEM5 power
  connector for its 600 W TDP. It connects via PCIe 5.0 x16 and provides four DisplayPort 2.1b
  outputs supporting up to 8K at 240 Hz or 16K at 60 Hz. Video engine support includes four
  ninth-generation NVENC encoders and four sixth-generation NVDEC decoders. The card also supports
  Multi-Instance GPU (MIG) with up to 4 fully isolated GPU instances. The GPU is distributed
  through PNY and available from workstation OEMs including Dell and HP.

