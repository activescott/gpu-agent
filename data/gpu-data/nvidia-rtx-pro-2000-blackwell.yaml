summary: |
  The NVIDIA RTX PRO 2000 Blackwell is a compact entry-level professional workstation GPU
  announced at SIGGRAPH 2025 and released on August 11, 2025. It is built on the NVIDIA Blackwell
  architecture (GB206 die, TSMC 5nm process) with 4,352 CUDA cores, 136 fifth-generation Tensor
  Cores, and 34 fourth-generation RT Cores. The card delivers 17.0 TFLOPS of single-precision
  FP32 compute and 545 AI TOPS (FP4 sparse), making it a notable upgrade over its predecessor
  the RTX 2000 Ada Generation in both graphics and AI performance.

  It features 16 GB of GDDR7 ECC memory on a 128-bit memory bus providing 288 GB/s bandwidth,
  a significant step up from the Ada predecessor's 224 GB/s GDDR6. The fifth-generation Tensor
  Cores add FP4 precision support alongside FP8, BF16, TF32, FP16, INT8, and INT4, enabling
  broader AI and machine learning workloads. The fourth-generation RT Cores double the intersection
  rate of the prior generation, accelerating ray tracing for professional visualization.

  With a TDP of only 70W and no external power connector required, the RTX PRO 2000 Blackwell
  maintains the same power envelope as its Ada predecessor while delivering substantially higher
  performance. The dual-slot, half-height form factor (2.7" H x 6.6" L) allows installation
  in both standard and small-form-factor workstations. It connects via PCIe 5.0 x8 and provides
  four mini-DisplayPort 2.1b outputs supporting up to four independent displays at 4K 165 Hz
  or two displays at 8K 100 Hz. Video engine support includes one ninth-generation NVENC encoder
  and one sixth-generation NVDEC decoder.

  The RTX PRO 2000 Blackwell succeeds the RTX 2000 Ada Generation and is distributed through
  PNY, TD SYNNEX, and embedded in compact workstations from BOXX, Dell, HP, and Lenovo.

