summary: |
  The NVIDIA RTX PRO 4500 Blackwell Workstation Edition is a professional dual-slot workstation GPU
  launched on March 18, 2025, built on the NVIDIA Blackwell architecture (GB203 die, TSMC 4nm process)
  with 10,496 CUDA cores across 82 streaming multiprocessors, 328 fifth-generation Tensor Cores, and
  82 fourth-generation RT Cores. It is positioned above the RTX PRO 4000 Blackwell in NVIDIA's
  professional desktop lineup and delivers 51 TFLOPS of single-precision FP32 compute and 1,617 AI
  TOPS (theoretical FP4 with sparsity).

  The card features 32 GB of GDDR7 ECC memory on a 256-bit memory bus providing 896 GB/s bandwidth.
  The fifth-generation Tensor Cores introduce FP4 precision support alongside FP8, BF16, TF32, FP16,
  INT8, and INT4, enabling broad AI and machine learning workloads on professional applications. The
  fourth-generation RT Cores provide hardware-accelerated ray tracing with doubled throughput versus
  the prior generation.

  With a TDP of 200W in a dual-slot, full-height form factor (4.4" H × 10.5" L), the RTX PRO 4500
  Blackwell Workstation Edition requires one 16-pin PCIe CEM5 power connector. It connects via PCIe
  5.0 x16 and provides four DisplayPort 2.1b outputs supporting up to 8K at 240 Hz or 16K at 60 Hz.
  Video engine support includes two ninth-generation NVENC encoders and two sixth-generation NVDEC
  decoders, a step up from the single-codec configuration of the RTX PRO 4000.

  The RTX PRO 4500 Blackwell uses the GB203 die (the same die as the GeForce RTX 5080 which has all
  10,752 shaders enabled and the RTX PRO 4000 with 8,960 shaders), with all 82 SMs active from the
  full 84-SM configuration of the die. The GPU is distributed through PNY and available from workstation
  OEMs including Dell and HP.

