summary: |
  The Intel Arc Pro B70 is the flagship professional workstation GPU in Intel's Arc Pro B-series lineup,
  released on March 25, 2026 and built on the Xe2 (Battlemage) architecture using TSMC's 5nm process. Unlike its
  smaller siblings (B50 and B60) which use the BMG-G21 die, the Arc Pro B70 uses the larger BMG-G31 die with
  32 Xe2 cores (compared to 20 cores in the B60), 256 XMX (Xe Matrix eXtension) engines for AI acceleration,
  and 32 ray tracing units. The GPU delivers 22.94 TFLOPS of FP32 compute performance and 367 peak TOPS of
  INT8 AI inference performance, paired with 32GB of GDDR6 memory on a 256-bit interface running at 19 Gbps for
  608 GB/s of memory bandwidth. The 32GB memory capacity positions the Arc Pro B70 as a compelling option for large-model
  AI inference workloads, significantly exceeding competing professional cards in its price tier for VRAM
  density. The 256 XMX engines support a wide range of precision formats including INT2, INT4, INT8, FP16,
  BF16, and TF32, providing exceptional flexibility for AI inference tasks. With a TBP of 230W and an
  $949 MSRP, the Arc Pro B70 delivers outstanding value for AI workstation deployments,
  offering capabilities that traditionally cost far more in competing NVIDIA or AMD professional card lineups.
  The GPU supports PCIe 5.0 x16 interface and the Xe2 architecture provides full support for DirectX 12
  Ultimate, Vulkan 1.3, OpenGL 4.6, and OpenCL 3.0, along with Intel oneAPI, OpenVINO, and the PyTorch
  IPEX extension for AI/ML frameworks. Display connectivity includes DisplayPort 2.1 outputs capable of
  driving displays at resolutions up to 7680x4320 (8K). Intel's Project Battlematrix multi-GPU configurations
  can leverage multiple Arc Pro B70 cards for even larger combined VRAM pools, with SR-IOV support for
  virtualization use cases. The card is certified for professional applications including Autodesk Maya,
  SolidWorks, Adobe Premiere Pro, Blender, and DaVinci Resolve.

