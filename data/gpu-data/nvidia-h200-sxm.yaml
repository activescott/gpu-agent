summary: >-
  The NVIDIA H200 SXM is a datacenter GPU accelerator built on the
  Hopper GH100 architecture using the same silicon die as the H100 SXM,
  but with a major memory upgrade to 141 GB of HBM3e at 4.8 TB/s bandwidth
  — approximately 1.75x the capacity and 1.43x the bandwidth of the H100 SXM.
  Announced at SC23 on November 13, 2023, it began shipping to OEM customers
  in Q2 2024 and reached general availability in November 2024. The H200 SXM
  targets HGX H200 and DGX H200 server platforms with the SXM5 socket,
  connected via NVLink 4 at 900 GB/s bidirectional per GPU and up to eight
  GPUs per baseboard. It delivers 1,979 TFLOPS of FP16/BF16 Tensor Core
  performance and 3,958 TFLOPS of FP8 Tensor Core performance (both with
  sparsity). The vastly expanded memory capacity is the primary differentiator:
  each H200 SXM can hold a full 70-billion-parameter LLM in a single GPU with
  headroom to spare, making it a leading choice for large language model
  inference without multi-GPU memory partitioning. The H200 SXM supports 4th
  generation Tensor Cores with the Transformer Engine for FP8 mixed-precision
  training, Multi-Instance GPU (MIG) with up to 7 instances, confidential
  computing, NVLink 4 fabric for scale-up across eight GPUs, and PCIe Gen5 x16
  for host connectivity. TDP is rated at 700 W (configurable up to 1000 W in
  specialized MLPerf configurations). A separate H200 NVL variant in PCIe form
  factor is available for air-cooled rack deployments.

