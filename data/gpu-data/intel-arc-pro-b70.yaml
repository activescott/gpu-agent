notes:
  - FP32 TFLOPS of 22.94 sourced from Intel official product specifications page (intel.com/content/www/us/en/products/sku/245797) and confirmed by ServeTheHome and Tom's Hardware reviews. This is consistent with 4096 shaders (32 Xe2 cores × 128 shaders/core) at 2800 MHz boost clock.
  - FP16 TFLOPS of 45.88 represents 2× FP32 performance, consistent with Xe2 architecture XMX engine throughput for FP16 operations. This 2:1 FP16:FP32 ratio is consistent across all Arc Pro B-series products (B50 10.65/21.3, B60 12.28/24.58) and Intel Xe2 architecture documentation.
  - 'INT8 TOPS of 367 represents dense (non-sparse) INT8 performance sourced from Intel official product specifications. Intel Arc Xe2 architecture does not use 2:4 structured sparsity, so published INT8 TOPS values are inherently dense. Dense value used for consistent cross-vendor comparison.'
  - Memory bandwidth of 608 GB/s calculated as 256-bit interface × 19 Gbps ÷ 8 bits/byte = 608 GB/s per Intel official specifications.
  - 'TBP (Thermal Base Power) of 230W at reference design (2800 MHz boost) sourced from Intel official product specifications. Intel specifies a TBP range of 160W-290W for partner implementations. The Arc Pro B70 requires external PCIe power connectors.'
  - XMX (Xe Matrix eXtension) engine count of 256 sourced from Intel official specifications (32 Xe2 cores × 8 XMX engines per core = 256 total), consistent with the XMX engine counts of related B-series products (B50 = 16 cores × 8 = 128, B60 = 20 cores × 8 = 160).
  - Xe2 architecture XMX engines support INT2, INT4, INT8, FP16, BF16, and TF32 precision formats on dedicated matrix multiplication hardware per Intel VTune Profiler documentation. TF32 is included in supportedHardwareOperations consistent with Intel Xe2 architecture capabilities.
  - FP64 double precision is supported by the general-purpose Xe Vector Engines (XVEs) on the BMG-G31 die per Xe2 architecture documentation.
  - The Arc Pro B70 uses the BMG-G31 die, a larger die than the BMG-G21 used in the Arc B580, Arc Pro B60, and Arc Pro B50. The BMG-G31 has 32 Xe2 cores enabling higher compute throughput and a 256-bit memory interface accommodating 32GB of GDDR6 memory.
  - 'MSRP of $949 USD sourced from Intel Newsroom launch announcement and corroborated by Tom''s Hardware, HotHardware, and Phoronix reviews at launch. Intel positioned the Arc Pro B70 at $949 to compete with NVIDIA and AMD professional workstation GPUs while offering substantially more VRAM (32GB) at that price point.'
  - Release date of 2026-03-25 sourced from HotHardware, ServeTheHome, and Tom's Hardware launch coverage. The B70 launched alongside the B65 announcement on March 25, 2026.
  - 'Intel Spec Code SA4H2 and ordering code 33P01IB0BB sourced from Intel official ordering page. The value 245797 in the product page URL is the Intel product SKU, not the Spec Code.'
  - No thirdPartyProducts are included because specific AIB partner model numbers and part numbers for Arc Pro B70 products could not be verified from official manufacturer product pages at time of research. AIB partners in the Arc Pro B-series ecosystem include ASRock, Sparkle, Gunnir, and Maxsun, but specific B70 product identifiers require verification against manufacturer websites.
