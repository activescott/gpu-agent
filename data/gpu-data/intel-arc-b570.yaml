summary: |
  The Intel Arc B570 is a discrete graphics card launched in January 2025, featuring Intel's second-generation
  Xe2-HPG (Battlemage) architecture on the BMG-G21 silicon. Built on TSMC's 5nm process with 18 Xe-cores
  (2,304 shading units), 144 XMX (Xe Matrix Extension) engines for AI acceleration, and 18 ray tracing units,
  the B570 sits just below the B580 in Intel's Battlemage consumer lineup. It includes 10GB of GDDR6 memory
  on a 160-bit bus running at 19 Gbps, delivering 380 GB/s of memory bandwidth. The B570 offers 11.52 TFLOPS
  of FP32 performance and 203 TOPS of INT8 performance through its XMX engines, which support FP16, BF16,
  INT8, and INT4 precision formats for AI/ML workloads. With a TDP of 150W and positioned at a $219 launch
  price, the Arc B570 offers strong value for 1080p and entry-level 1440p gaming. The architecture features
  the same die as the B580 (BMG-G21) but with two fewer active Xe-cores and a reduced 160-bit memory interface
  instead of the B580's 192-bit interface. Notable features include support for DirectX 12 Ultimate, Vulkan 1.3,
  PCIe 4.0 x8, and Intel's XeSS upscaling technology powered by the XMX AI accelerators. The 144 XMX engines
  support INT4, INT8, FP16, and BF16 matrix operations via the DPAS (Dot Product Accumulate Systolic) instruction
  for accelerated AI inference and upscaling.

