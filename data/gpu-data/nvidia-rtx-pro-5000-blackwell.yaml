summary: |
  The NVIDIA RTX PRO 5000 Blackwell is a professional dual-slot, full-height workstation GPU
  launched on March 18, 2025, built on the NVIDIA Blackwell architecture (GB202-250-A1 die,
  TSMC 4nm process). It features 14,080 CUDA cores across 110 streaming multiprocessors,
  440 fifth-generation Tensor Cores, and 110 fourth-generation RT Cores. As the flagship of
  the RTX PRO Blackwell desktop GPU family, it delivers 65 TFLOPS of FP32 compute and 2,064
  AI TOPS (FP4 with sparsity).

  The card features 48 GB of GDDR7 ECC memory on a 384-bit memory bus providing 1,344 GB/s
  bandwidth. The fifth-generation Tensor Cores support FP4 and FP8 precisions alongside BF16,
  TF32, FP16, INT8, and INT4, enabling broad AI and machine learning workloads. The
  fourth-generation RT Cores provide hardware-accelerated ray tracing with doubled throughput
  versus the prior generation. The card also includes Multi-Instance GPU (MIG) support,
  allowing the GPU to be partitioned into up to two independent 24GB instances.

  With a TDP of 300W in a dual-slot, full-height form factor (4.4" H x 10.5" L), the RTX PRO
  5000 Blackwell requires one 16-pin PCIe CEM5 power connector. It connects via PCIe 5.0 x16
  and provides four DisplayPort 2.1b outputs. Video engine support includes three ninth-
  generation NVENC encoders, three sixth-generation NVDEC decoders, and one JPEG encoder.

  The RTX PRO 5000 Blackwell uses a cut-down GB202 die (110 of 170 SMs active), the same
  top-tier Blackwell die used in the consumer GeForce RTX 5090 (which enables all 170 SMs
  with 21,760 CUDA cores). NVIDIA later added a 72GB variant (NVPN 900-5G153-2270-000),
  launched in December 2025, which uses a 512-bit memory bus to accommodate the higher memory
  capacity while sharing the same compute configuration and 300W TDP. The GPU is distributed
  through PNY and available from workstation OEMs including Dell, HP, and Lenovo.

