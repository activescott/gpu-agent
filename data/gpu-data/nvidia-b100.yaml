summary: >-
  The NVIDIA B100 is a Blackwell-architecture datacenter GPU accelerator built
  for large-scale AI training and inference in x86-based HGX server platforms.
  Announced at NVIDIA GTC March 2024 alongside the B200 and GB200 Superchip,
  the B100 is positioned as the lower-power Blackwell datacenter GPU at 700 W
  TDP — identical to the H100 SXM5 power envelope — making it a drop-in
  replacement for existing HGX H100 infrastructure without requiring new
  power delivery or cooling. The B100 uses the same dual-chiplet GB100 package
  as the B200, with two reticle-sized dies on a single substrate for a combined
  208 billion transistors, manufactured on TSMC custom 4NP process. It
  delivers 192 GB of HBM3e memory at 8 TB/s bandwidth via an 8192-bit memory
  bus (two 4096-bit sub-interfaces, one per die). Tensor Core performance reaches
  7 PFLOPS FP4, 3.5 PFLOPS FP8/INT8, and 1.75 PFLOPS FP16/BF16 in dense
  (non-sparse) operation; with 2:4 structured sparsity these double to 14, 7,
  and 3.5 PFLOPS respectively. The B100 includes 5th-generation NVLink at
  1.8 TB/s GPU-to-GPU bidirectional bandwidth, connecting up to 8 GPUs per HGX
  B100 baseboard for 14.4 TB/s total NVLink bandwidth. Compute capability is
  10.0 (sm_100), enabling access to Blackwell-specific CUDA features including
  5th-generation Tensor Cores with native FP4 support, a second-generation
  Transformer Engine supporting FP8 and FP4 precision, NVLink 5, and PCIe 6.0.
  The B100 shipped in limited quantities in Q4 2024; NVIDIA subsequently
  concentrated production volume on the B200 and B300. As a result, the B100
  saw narrower OEM adoption than its announcement suggested.

