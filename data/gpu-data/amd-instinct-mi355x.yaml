summary: >-
  The AMD Instinct MI355X is the liquid-cooled flagship variant of AMD's CDNA 4
  architecture AI and HPC datacenter accelerator, launched on June 12, 2025 at
  the AMD Advancing AI 2025 event in San Jose, California alongside the
  air-cooled MI350X sibling. Both share the same multi-chiplet design: 8
  Accelerator Complex Dies (XCDs) manufactured on TSMC N3P (3 nm) plus 2 I/O
  dies on TSMC 6 nm, totaling 185 billion transistors. The MI355X features 256
  CDNA 4 compute units (32 CUs per XCD), 16,384 stream processors, and 1,024
  Matrix Cores with a peak engine clock of 2,400 MHz versus 2,200 MHz on the
  MI350X. The higher clock speeds, enabled by the 1,400W liquid-cooled TBP (vs.
  1,000W air-cooled for MI350X), deliver approximately 9% higher throughput
  across all precision formats. The MI355X delivers 157.3 TFLOPS FP32 and 78.6
  TFLOPS FP64 vector performance. Matrix performance with 2:4 structured sparsity
  reaches 5.0 PFLOPS for FP16/BF16, 10.1 PFLOPS for FP8 and INT8, and 10.1
  PFLOPS for FP4/MXFP4 — the highest per-GPU AI compute AMD has published.
  Dense (non-sparse) matrix performance is 2.5 PFLOPS for FP16/BF16, 5.0 PFLOPS
  for FP8/INT8, and 10.1 PFLOPS for FP4. Native support for CDNA 4's new
  microscaling formats (MXFP4, MXFP6, MXFP8) enables very high throughput for
  quantized AI inference. The memory subsystem is identical to the MI350X: 288 GB
  of 12-high HBM3E via an 8,192-bit interface at 8 TB/s (8,000 GB/s) peak
  bandwidth — a 33% improvement over the MI325X. The MI355X uses the OAM (OCP
  Accelerator Module) form factor with passive-plus-active cooling infrastructure
  requiring direct liquid cooling, PCIe 5.0 x16 host interface, and 7
  fourth-generation Infinity Fabric links at 153 GB/s each. AMD named the MI355X
  the direct competitor to the NVIDIA B200 and HGX B200, and announced Oracle
  Cloud Infrastructure as the first hyperscaler deploying the MI355X at scale —
  with OCI planning clusters of up to 131,072 MI355X GPUs. Mass production and
  customer shipments were slated for Q3 2025.

