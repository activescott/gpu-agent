notes:
  - 'FP32 TFLOPS of 17.0 sourced directly from the NVIDIA RTX PRO 2000 Blackwell official datasheet (nvidia.com), representing single-precision CUDA core FP32 performance. Consistent with 4,352 CUDA cores x 1,957 MHz boost clock x 2 ops/cycle / 1000 = 17.03 TFLOPS.'
  - 'AI TOPS of 545 is the ''AI TOPS'' figure from the NVIDIA official datasheet, representing theoretical FP4 TOPS with 2:4 sparsity (confirmed by the RTX PRO 4000 Blackwell datasheet footnote: ''Theoretical FP4 TOPS using the sparsity feature'').'
  - 'int8TOPS of 136.25 represents non-sparse (dense) INT8 performance, derived from FP4 sparse TOPS: 545 (FP4 sparse) / 4 = 136.25 (INT8 dense). Derivation: FP4 sparse = 2x INT8 sparse = 4x INT8 dense per Blackwell 5th-gen tensor core architecture. Dense value used for consistent cross-vendor comparison.'
  - 'fp16TFLOPS of 136.25 represents Peak FP16 Tensor TFLOPS with sparsity, derived from FP4 sparse TOPS using the Blackwell tensor core ratio (FP16 sparse = FP4 sparse / 4): 545 / 4 = 136.25 TFLOPS. This ratio is consistent with the RTX 5070 where FP16 sparse = 246.9 TFLOPS (from nvidia-geforce-rtx-5070.yaml, sourced from Blackwell GPU architecture whitepaper Table 6). The NVIDIA datasheet does not publish FP16 separately for this workstation card.'
  - 'Memory bandwidth of 288 GB/s per NVIDIA official datasheet and confirmed by multiple sources. The memory is 16 GB GDDR7 ECC on a 128-bit bus.'
  - 'GPU die is GB206 on TSMC 5nm process with approximately 21.9 billion transistors. Architecture uses compute capability 12.0 (sm_120), confirmed by the official NVIDIA CUDA GPUs table at developer.nvidia.com/cuda-gpus.'
  - 'Tensor core count of 136 confirmed by Newegg product listing and multiple third-party sources. The GB206 has 34 SMs x 128 CUDA cores per SM = 4,352 CUDA cores; 34 SMs x 4 tensor core units per SM = 136 tensor cores (same 4-per-SM ratio as Ada Lovelace).'
  - 'Released at SIGGRAPH 2025 on August 11, 2025. Previously announced via NVIDIA blog in early 2025 as ''coming later this year.'' Source: TechPowerUp launch date, SIGGRAPH 2025 announcement via multiple tech news outlets.'
  - 'FP4 hardware precision is supported by 5th-generation Tensor Cores. FP8 is also supported. Software-level support for FP8 in NVIDIA Transformer Engine requires compute capability 9.x (Hopper) and does not support Blackwell desktop GPUs (sm_120) via that specific library path; lower-level libraries (cuBLASLt, TensorRT) support FP8 on Blackwell.'
  - 'Estimated MSRP of $849 USD based on launch-time market pricing. NVIDIA does not publish official MSRP for workstation GPUs. Newegg lists the PNY variant (VCNRTXPRO2000B-PB) at $849.99 and Wiredzone lists the NVIDIA OEM version (900-5G195-2250-000) at $848.00. CG Channel cited $722 from reseller Connection at announcement time. The $849 price represents the consistent retail list price across major distributors at/near launch.'
  - 'NVPN 900-5G195-2250-000 sourced from B&H Photo, Newegg, and Wiredzone product listings for the NVIDIA OEM version. No official board ID documented for this GPU; other NVIDIA workstation GPUs use a PG-prefixed board ID (e.g., L40 uses PG133, RTX A5000 uses PG132) derived separately from the NVPN.'
  - 'PNY SKU VCNRTXPRO2000B-PB confirmed from Newegg and ProVantage product listings. HP part number B5CH7AA confirmed from ProVantage and Hashrate.no product listings. Lenovo part number 4X61T95638 confirmed from lenovo.com product page listing and eBay listing.'
  - 'No external power connector required; 70W TDP supplied entirely via PCIe slot. Same power envelope as predecessor RTX 2000 Ada Generation (also 70W).'
