summary: |
  The Intel Arc Pro B65 is a professional workstation GPU announced on March 25, 2026 alongside the Arc Pro B70,
  with AIB partner availability in mid-April 2026. Built on the Xe2 (Battlemage) architecture using TSMC's 5nm process,
  featuring 20 Xe2 cores, 160 XMX (Xe Matrix eXtension) engines for AI acceleration, and 20 ray tracing units. The B65
  is distinguished from the Arc Pro B60 primarily by its expanded 32GB GDDR6 memory capacity on a wider 256-bit memory
  interface running at 19 Gbps, delivering 608 GB/s of memory bandwidth. This makes it particularly well-suited for
  large-scale AI inference workloads and professional applications requiring extensive VRAM. The GPU delivers 12.28 TFLOPS
  of FP32 compute performance and 197 TOPS of INT8 AI inference performance through its 160 XMX engines. The XMX engines
  support a wide range of precision formats including INT2, INT4, INT8, FP16, BF16, and TF32, providing exceptional
  flexibility for AI inference tasks. With a TBP of 200W, the Arc Pro B65 shares its power envelope with the Arc Pro B60.
  The GPU uses a cut-down BMG-G31 die (27.7 billion transistors on a 368mm2 die, manufactured on TSMC N5), the same
  larger die used by the Arc Pro B70 but with 20 of 32 Xe2 cores active. This distinguishes the B65 from the Arc Pro
  B60 and Arc B580, which use the smaller BMG-G21 die. The B65 supports PCIe 5.0 x16 interface and features DisplayPort 2.1 outputs with support for up to four
  displays at resolutions up to 7680x4320. The card has been certified for professional applications including Autodesk
  Maya, SolidWorks, Adobe Premiere Pro, Blender, and DaVinci Resolve. The GPU also supports SR-IOV, Linux containers,
  and parallel multi-GPU operation. Intel's expanded VRAM strategy positions the Arc Pro B65 as an inference workstation
  GPU targeting LLM inference tasks where 32GB VRAM enables loading larger AI models without quantization or offloading.

