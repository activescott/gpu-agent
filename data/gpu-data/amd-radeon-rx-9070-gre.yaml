summary: |
  The AMD Radeon RX 9070 GRE (Golden Rabbit Edition) is a mid-range gaming graphics card
  based on the RDNA 4 architecture using the Navi 48 GPU die. Originally launched in China
  on May 8, 2025, it received a global release on June 2, 2026 at $549 USD. The card features
  48 compute units with 3,072 stream processors, 96 2nd-generation AI Accelerators, and 12 GB
  of GDDR6 memory on a 192-bit bus running at 18 Gbps, delivering 432 GB/s of memory bandwidth.
  It is positioned between the RX 9060 XT and the standard RX 9070 in AMD's lineup, offering
  a differentiated option with 12 GB VRAM (versus 16 GB on the RX 9070) on a narrower 192-bit
  bus at the same $549 price point as the RX 9070 at launch. Built on TSMC's N4P (4nm) process,
  the Navi 48 die measures 356.5 mm2 with 53.9 billion transistors. The boost clock reaches
  2,790 MHz with a game clock of approximately 2,220 MHz, and total board power is 220 W.
  With 48 MB of 3rd-generation Infinity Cache and 48 3rd-generation Ray Tracing accelerators,
  the RX 9070 GRE delivers 34.3 TFLOPS of FP32 compute and 274 TOPS of dense INT8 AI performance.
  It supports FSR 4 (FidelityFX Super Resolution 4), AMD's machine-learning upscaling solution
  exclusive to RDNA 4, and uses a PCIe 5.0 x16 interface with DisplayPort 2.1a and HDMI 2.1b outputs.

