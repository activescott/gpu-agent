summary: |
  The NVIDIA RTX PRO 6000 Blackwell Server Edition is the data-center variant of the flagship
  RTX PRO 6000 Blackwell GPU family, announced at GTC25 Spring on March 18, 2025. It uses the
  same full-configuration GB202 die as the Workstation Edition — 24,064 CUDA cores across 188
  streaming multiprocessors, 752 fifth-generation Tensor Cores, and 188 fourth-generation RT Cores
  — but is optimized for deployment in 1U and 2U rack servers using passive (fanless) cooling that
  relies on chassis airflow rather than an active cooling solution.

  The Server Edition delivers 120 TFLOPS of FP32 single-precision compute and 4 PFLOPS of peak FP4
  AI performance, compared to the Workstation Edition's 125 TFLOPS FP32. Both variants carry 96 GB
  of GDDR7 ECC memory on a 512-bit bus, but the Server Edition operates at a lower memory data rate
  producing 1,597 GB/s bandwidth versus the Workstation Edition's 1,792 GB/s. The TDP is listed as
  configurable up to 600 W; PNY documentation states a range of 400 W to 600 W, enabling OEM system
  builders to tune power draw for specific server chassis thermal envelopes.

  The card connects via PCIe 5.0 x16 and occupies a full-height, full-length dual-slot form factor
  (4.4 in H x 10.5 in L), a shorter board length than the Workstation Edition (12.0 in), suited to
  standard 2U rack servers. It supports Multi-Instance GPU (MIG) with up to four fully isolated 24 GB
  GPU instances. Video engine support includes four ninth-generation NVENC encoders and four
  sixth-generation NVDEC decoders. Four DisplayPort 2.1b outputs are present but disabled by default
  in server configurations.

  The card is supplied through OEM server partners including Cisco, Dell Technologies, HPE, Lenovo,
  and Supermicro. It is also distributed by PNY under the TCSRTX6000PROSE-PB and
  NVRTXPRO6000TCGPU-KIT SKUs. NVIDIA uses the 2G153 board identifier for the Server Edition,
  distinct from the 5G144 board identifier used for the Workstation Edition.

