notes:
  - 'FP32 TFLOPS of 51.0 sourced directly from the PNY official datasheet for the RTX PRO 4500 Blackwell Workstation Edition (pny.com), footnote 1 states it is based on GPU Boost clock. This is consistent with 10,496 CUDA cores at the TechPowerUp-reported 2407 MHz boost clock: 10,496 × 2407 × 2 / 1,000,000 ≈ 50.53 TFLOPS ≈ 51 TFLOPS. CG Channel reported 39.6 TFLOPS in their March 2025 announcement article; the PNY datasheet is more authoritative and the 51 TFLOPS figure is consistent with the known boost clock.'
  - 'AI TOPS of 1,617 is from the PNY official datasheet footnotes, labeled as theoretical FP4 TOPS using the sparsity feature (footnote 2 confirms sparsity is applied). This follows the same convention as the RTX PRO 4000 Blackwell where "AI TOPS" = FP4 sparse.'
  - 'int8TOPS of 404.25 represents non-sparse (dense) INT8 performance, derived from FP4 sparse TOPS: 1,617 (FP4 sparse) / 4 = 404.25 TOPS. Derivation: FP4 sparse = 2x INT8 sparse = 4x INT8 dense per Blackwell 5th-gen tensor core architecture. Dense value used for consistent cross-vendor comparison.'
  - 'fp16TFLOPS of 404.25 is FP16 Tensor Core throughput with 2:4 structured sparsity, derived from FP4 sparse TOPS using the Blackwell tensor core ratio (FP16 sparse = FP4 sparse / 4): 1,617 / 4 = 404.25 TFLOPS. Dense FP16 Tensor = 404.25 / 2 = 202.125 TFLOPS. The NVIDIA product page does not publish FP16 separately for this workstation card.'
  - 'Memory bandwidth of 896 GB/s per NVIDIA official product page and PNY datasheet. The memory is 32 GB GDDR7 ECC on a 256-bit bus. TechPowerUp reports 1750 MHz memory clock; 256 bits / 8 bytes × 1750 MHz × 2 (DDR) / 1000 = 896 GB/s.'
  - 'CUDA core count of 10,496 confirmed by TechPowerUp GPU database meta (GB203, 10496 Cores), PNY datasheet, and Newegg product listings. TechPowerUp also confirms 328 TMUs and 112 ROPs. GPU die is GB203 (same as GeForce RTX 5080 which has all 10,752 shaders enabled); the RTX PRO 4500 Blackwell has 10,496 shaders with 82 of 84 SMs active.'
  - 'Tensor core count of 328 confirmed by Newegg product listing for NVPN 900-5G147-2250-000 (specifications table states "Tensor Cores: 328") and matches the SM count: 82 SMs × 4 tensor cores per SM = 328 tensor cores. RT core count of 82 (one per SM, 4th generation).'
  - 'TDP of 200W per NVIDIA official product page and PNY datasheet. Requires one 16-pin PCIe CEM5 power connector per PNY datasheet and Newegg listing.'
  - 'GPU die is GB203 on TSMC 4nm process. TechPowerUp meta tag confirms GB203 die. Architecture uses compute capability 12.0 (sm_120), confirmed by the official NVIDIA CUDA GPUs table at developer.nvidia.com/cuda-gpus where RTX PRO 4500 Blackwell is listed with CC 12.0.'
  - 'Release date of March 18, 2025 per TechPowerUp GPU database. CG Channel reported the announcement on March 18, 2025; OEM availability was slated for summer 2025.'
  - 'FP4 hardware precision is supported by 5th-generation Tensor Cores. FP8, BF16, TF32, FP16, INT8, and INT4 are also supported by the Blackwell architecture tensor cores. Transformer Engine 2.15+ supports Blackwell (sm_120) for FP8, MXFP8, and NVFP4.'
  - 'Estimated MSRP of $3,199 USD based on launch-time retail pricing. NVIDIA does not publish an official MSRP for professional workstation GPUs. The PNY retail-boxed variant (VCNRTXPRO4500B-PB) was listed at $3,199.99 on Newegg.com at launch, which is the primary basis for this MSRP. For reference: the NVIDIA-branded OEM variant (900-5G147-2250-000) was listed at $3,018.99 on Newegg.com (different product variant, lower price), and the same PNY SKU was listed at $3,799.00 on B&H Photo (product ID 1898512-REG; higher than Newegg at launch). The $3,199 figure reflects the PNY retail-boxed launch price from Newegg.'
  - 'NVPN 900-5G147-2250-000 sourced from Newegg product listing (N82E16814132110) for the NVIDIA-branded OEM variant. NVPN 900-5G147-2550-000 sourced from Insight.com product page (insight.com/en_US/shop/product/900-5G147-2550-000). The board_id prefix 5G147 is shared with the RTX PRO 4000 Blackwell (both use the GB203 die), consistent with NVIDIA workstation card naming conventions.'
  - 'PNY SKU VCNRTXPRO4500B-PB confirmed from Newegg product listing (N82E16814985048). Dell part number 490-BLPL confirmed from dell.com official product page (multiple regional URLs). HP part number B11F2AA confirmed from hp.com GB product page and multiple reseller listings (redcorp.com, provantage.com, gpus.net).'
