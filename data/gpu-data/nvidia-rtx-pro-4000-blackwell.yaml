notes:
  - 'FP32 TFLOPS of 40.0 sourced directly from the NVIDIA RTX PRO 4000 Blackwell official product page (nvidia.com), representing single-precision CUDA core FP32 performance at GPU-Boost clock. Consistent with 8,960 CUDA cores x 2,232 MHz boost clock x 2 ops/cycle / 1000 = 40.00 TFLOPS (derived boost clock, not explicitly published by NVIDIA).'
  - 'AI TOPS of 1,290 is the figure from the NVIDIA official product page, labeled as theoretical FP4 TOPS using the sparsity feature (per page footnote: "Theoretical FP4 TOPS using the sparsity feature"). Consistent with the RTX PRO 2000 Blackwell datasheet footnote which confirms Blackwell uses FP4 sparse for the AI TOPS figure.'
  - 'int8TOPS of 322.5 represents non-sparse (dense) INT8 performance, derived from FP4 sparse TOPS: 1,290 (FP4 sparse) / 4 = 322.5 (INT8 dense). Derivation: FP4 sparse = 2x INT8 sparse = 4x INT8 dense per Blackwell 5th-gen tensor core architecture. Dense value used for consistent cross-vendor comparison.'
  - 'fp16TFLOPS of 322.5 is FP16 Tensor Core throughput with 2:4 structured sparsity, derived from FP4 sparse TOPS using the Blackwell tensor core ratio (FP16 sparse = FP4 sparse / 4): 1,290 / 4 = 322.5 TFLOPS. Dense FP16 Tensor = 322.5 / 2 = 161.25 TFLOPS. The NVIDIA product page does not publish FP16 separately for this workstation card.'
  - 'Memory bandwidth of 672 GB/s per NVIDIA official product page and confirmed by Wiredzone, Provantage, and multiple third-party sources. The memory is 24 GB GDDR7 ECC on a 192-bit bus at 28.0 Gbps effective speed (672 / 24 bytes = 28 Gbps).'
  - 'CUDA core count of 8,960 confirmed by B&H Photo product listing snippet (8960 CUDA Cores), Wiredzone product page, Provantage, and CG Channel article. The GPU die is GB203 (same as GeForce RTX 5080 which has all 10,752 shaders enabled); the RTX PRO 4000 has 70 of 84 SMs active per TechPowerUp.'
  - 'Tensor core count of 280 confirmed by multiple third-party databases (gpus.net, HMC-tech, axiomgaming). 70 SMs x 4 tensor cores per SM = 280 tensor cores. RT core count of 70 confirmed by TechPowerUp search snippet and gpus.net (70 RT acceleration cores, one per SM).'
  - 'TDP of 145W per NVIDIA official product page. Some third-party sources (Provantage, CG Channel, gpus.net, axiomgaming) list 140W; NVIDIA official value of 145W is used as authoritative. Card requires one 16-pin power connector per Provantage listing.'
  - 'GPU die is GB203 on TSMC 4nm process with approximately 45.6 billion transistors and 378mm2 die area (per gpus.net, HMC-tech; consistent with GB203 known parameters). Architecture uses compute capability 12.0 (sm_120), confirmed by the official NVIDIA CUDA GPUs table at developer.nvidia.com/cuda-gpus.'
  - 'Release date of March 18, 2025 per TechPowerUp GPU database and PNY press release (pny.com). The GPU was announced March 18, 2025. Per the NVIDIA investor press release and CG Channel, the RTX PRO 5000/4500/4000 Blackwell were slated for distribution "in the summer" of 2025 through OEM workstation partners.'
  - 'FP4 hardware precision is supported by 5th-generation Tensor Cores. FP8 is also supported. Transformer Engine 2.15+ supports Blackwell (sm_120) for FP8, MXFP8, and NVFP4 (per official TE documentation). In practice, as of the March 2025 launch, many pre-built vLLM and framework images had incomplete sm_120 kernel support, requiring builds from source with CUDA 12.8+ and TORCH_CUDA_ARCH_LIST=12.0 to fully use FP8 on this card.  Lower-level libraries (cuBLASLt, TensorRT) support FP8 natively on Blackwell.'
  - 'Estimated MSRP of $1,799 USD based on launch-time market pricing. NVIDIA does not publish official MSRP for professional workstation GPUs. Dell lists the card (part 490-BLNG) at $1,799.99 at dell.com. Wiredzone lists the NVIDIA OEM variant (NVPN 900-5G147-0070-000) at $1,824.00. The $1,799 price represents the consistent retail/OEM list price at launch.'
  - 'NVPN 900-5G147-2270-000 (bulk/OEM) sourced from B&H Photo product listing (product ID 1938761-REG). NVPN 900-5G147-2570-000 (retail) confirmed from gpus.net, serversupply.com, and centralcomputer.com. NVPN 900-5G147-0070-000 (Wiredzone OEM direct) sourced from Wiredzone product listing. The board_id prefix is 5G147 (analogous to other NVIDIA workstation cards using 5G-prefix board IDs).'
  - 'PNY SKU VCNRTXPRO4000B-PB confirmed from Newegg, Provantage, and B&H Photo product listings. Dell part number 490-BLNG confirmed from dell.com official product page. HP part number B11F3AA confirmed from gpus.net and ProVantage. Lenovo part number 4X61T95636 confirmed from lenovo.com product page URL (GB English locale).'
