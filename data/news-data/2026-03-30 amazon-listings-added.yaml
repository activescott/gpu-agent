title: "Amazon Listings Now Available Alongside eBay"
content: |
  GPU Poet now pulls listings from Amazon in addition to eBay. Amazon results appear on all [price-compare](/gpu/price-compare), [ranking](/gpu/ranking/ai/fp32-flops), and individual [shop pages](/gpu/shop/nvidia-geforce-rtx-4070) right alongside eBay listings.

  ## What's New

  Each listing card now shows a marketplace icon indicating whether it's from eBay or Amazon. Amazon listings include a price timestamp showing when the price was last checked.

  A new **Marketplace** filter has been added across all listing pages — you can show only eBay, only Amazon, or both.
