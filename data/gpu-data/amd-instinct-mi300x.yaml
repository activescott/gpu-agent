summary: >-
  The AMD Instinct MI300X is AMD's flagship AI and HPC datacenter accelerator,
  launched on December 6, 2023, as the first commercial chip built on the CDNA 3
  architecture. It uses a multi-chiplet design with 8 Accelerator Complex Dies
  (XCDs) on TSMC N5 and 4 I/O dies on TSMC N6, totaling 153 billion transistors
  across the package. The MI300X delivers 304 CDNA 3 compute units and 1,216
  Matrix Cores, enabling broad support for AI and HPC data types including FP64
  vector (81.7 TFLOPS), FP64 matrix (163.4 TFLOPS), FP32 (163.4 TFLOPS), TF32,
  FP16, BF16, FP8, and INT8 precisions. Its defining feature at launch was an
  industry-leading 192 GB of on-package HBM3 memory with 5.3 TB/s (5,300 GB/s)
  of peak memory bandwidth — providing roughly 2.4x the memory capacity and 1.6x
  the bandwidth of the NVIDIA H100 SXM. The MI300X uses the OAM (OCP Accelerator
  Module) form factor and connects to the host via PCIe 5.0 x16. Up to 8 MI300X
  OAM modules are combined on a Universal Base Board (UBB) to form the AMD
  Instinct MI300X Platform, providing 1.5 TB of aggregate HBM3 memory. The CDNA
  3 architecture introduces support for FP8 and structured 2:4 sparsity, enabling
  peak INT8 throughput of 5,229.8 TOPS with sparsity. The MI300X was positioned
  as a direct competitor to the NVIDIA H100 SXM, particularly for large language
  model inference workloads where its massive memory advantage reduces the need
  for multi-GPU parallelism. Common part numbers include AMD OPN 100-300000045H
  (single OAM module) and 100-300000069H (8-GPU platform UBB configuration).

