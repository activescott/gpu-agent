summary: |
  The AMD Radeon RX 9060 is an entry-level RDNA 4 graphics card released on August 5, 2025,
  initially available only through OEM pre-built systems. Based on the Navi 44 XL GPU die
  (same die as the RX 9060 XT), it operates with 28 compute units and 1,792 stream processors,
  trimmed down from the 9060 XT's 32 CUs. The card features 56 2nd-generation AI Accelerators,
  28 3rd-generation Ray Tracing accelerators, and 32 MB of Infinity Cache. With 8 GB of GDDR6
  memory running at 18 Gbps on a 128-bit interface, it delivers 288 GB/s of memory bandwidth,
  slightly lower than the 9060 XT's 320 GB/s. The boost clock reaches 2,990 MHz with a game
  clock of 2,400 MHz, and the total board power is a modest 132W. The card is built on TSMC's
  4nm (N4P) process with 29.7 billion transistors on a 199 mm2 die. It delivers 21.4 TFLOPS
  of FP32 compute and 172 TOPS of dense INT8 AI performance through RDNA 4's AI Accelerators.
  The RX 9060 supports PCIe 5.0 x16 and features DisplayPort 2.1a and HDMI 2.1b outputs.
  AMD positioned it to compete with NVIDIA's RTX 5050 in the OEM market, with performance
  approximately 13-14% below the RX 9060 XT 8GB. FSR 4 (FidelityFX Super Resolution 4),
  AMD's machine-learning upscaling technology exclusive to RDNA 4, is supported.
