summary: >-
  The NVIDIA H200 NVL is a PCIe form-factor datacenter GPU accelerator built on
  the Hopper GH100 architecture, announced at SC24 on November 18, 2024.
  It shares the same GH100 silicon die and 141 GB HBM3e memory at 4.8 TB/s as
  the H200 SXM, but operates at a lower TDP of up to 600 W (configurable down
  to 450 W) to enable deployment in air-cooled enterprise rack designs that
  cannot accommodate liquid-cooled SXM baseboard systems. The "NVL" designation
  refers to NVLink bridge connectors on the PCIe card, enabling 2-way or 4-way
  GPU interconnect at 900 GB/s per GPU — substantially higher bandwidth than
  PCIe Gen5 alone (128 GB/s). The lower thermal envelope results in modestly
  reduced peak compute: FP32 CUDA core performance is 60 TFLOPS (vs. 67 TFLOPS
  for the SXM), and FP16/BF16 Tensor Core performance with sparsity is 1,671
  TFLOPS (vs. 1,979 TFLOPS for the SXM). FP8 Tensor Core performance with
  sparsity is 3,341 TFLOPS. The H200 NVL connects via PCIe Gen5 x16 and
  supports Multi-Instance GPU (MIG) with up to 7 instances, confidential
  computing, and NVIDIA's Transformer Engine for FP8 mixed-precision training.
  It is the successor to the H100 PCIe and is positioned as the flexible,
  single-GPU or multi-GPU accelerator for air-cooled data centers, delivering
  approximately 2.35x the memory bandwidth and 1.76x the memory capacity of
  the H100 PCIe while retaining PCIe form-factor compatibility.

