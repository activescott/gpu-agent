notes:
  - 'FP32 TFLOPS of 12.28 sourced from Intel official product specifications. The Arc Pro B65 uses a cut-down BMG-G31 die with 20 active Xe2 cores (of 32 total) at 2400 MHz boost clock, delivering the same compute throughput as the B60 despite using a different die.'
  - 'FP16 TFLOPS of 24.58 based on 2:1 ratio of FP16 to FP32 performance, consistent with Xe2 architecture and identical to the Arc Pro B60. Intel does not publish FP16 TFLOPS directly for professional workstation GPUs. Value follows the same methodology documented for the Arc Pro B60.'
  - 'INT8 TOPS of 197 represents dense (non-sparse) INT8 AI performance sourced from Intel official product specifications. Intel Arc XMX engines do not implement NVIDIA-style 2:4 structured sparsity, so published values are inherently dense and used directly for cross-vendor comparison. The B65 uses the same compute configuration as the B60 (20 Xe2 cores, 160 XMX engines at 2400 MHz), resulting in the same INT8 TOPS.'
  - 'Memory bandwidth of 608 GB/s calculated as 256-bit interface x 19 Gbps / 8 bits/byte = 608 GB/s. The B65 uses a wider 256-bit memory bus compared to the B60s 192-bit bus (456 GB/s), providing significantly higher bandwidth while maintaining the same 19 Gbps GDDR6 memory speed.'
  - 'Memory capacity of 32GB GDDR6 is the primary differentiator from the Arc Pro B60 (24GB on 192-bit bus). The wider 256-bit bus enables both higher bandwidth and larger VRAM capacity.'
  - 'TBP (Total Board Power) is 200W sourced from Intel official specifications. Despite using the larger BMG-G31 die (vs B60 on BMG-G21), the TBP matches the B60 because only 20 of 32 Xe2 cores are active.'
  - 'XMX (Xe Matrix eXtension) engine count of 160 based on 20 Xe2 cores x 8 XMX engines per core, confirmed by architecture documentation. These are Intel dedicated AI accelerators, equivalent to tensor cores in NVIDIA GPUs.'
  - 'Xe2 architecture XMX engines support INT2, INT4, INT8, FP16, BF16, and TF32 precision formats on dedicated matrix multiplication hardware, as documented in Xe2 architecture analysis and Intel VTune Profiler documentation.'
  - 'FP64 double precision performance is supported on general-purpose shader units (XVEs) per Xe2 architecture documentation, though Intel does not officially publish FP64 TFLOPS for this GPU.'
  - 'Estimated MSRP of $799 USD based on market positioning between the B60 ($599) and B70 ($949-$950). Intel has not published an official MSRP for the B65. The B65 premium over the B60 reflects the additional VRAM (32GB vs 24GB) and memory bandwidth (608 vs 456 GB/s) from the wider 256-bit memory interface.'
  - 'Announced March 25, 2026 alongside the Arc Pro B70. The B65 is available through AIB partners only (Intel is not producing a reference design), with availability estimated mid-April 2026. Source: ServeTheHome, Tom''s Hardware, and HotHardware launch coverage.'
  - 'The B65 uses the BMG-G31 die (27.7 billion transistors, 368mm2, TSMC N5), the same die as the Arc Pro B70, but with 20 of 32 Xe2 cores active. This is distinct from the Arc Pro B60 and Arc B580 which use the smaller BMG-G21 die (19.6 billion transistors, 272mm2). The B65 features PCIe 5.0 x16 (vs B60''s PCIe 5.0 x8) and a 256-bit/32GB GDDR6 memory configuration.'
  - 'The GPU supports DirectX 12 Ultimate, Vulkan 1.3, OpenGL 4.6, and OpenCL 3.0 APIs.'
  - 'Intel Project Battlematrix multi-GPU strategy applies to the B65, enabling configurations with multiple B65 GPUs providing very large combined VRAM pools for LLM inference workloads.'
  - 'No third-party AIB products documented as confirmed product data for B65 AIB cards was not available in public sources at time of research. AIB partners confirmed for the B60 (ASRock, Maxsun) may also offer B65 variants.'
