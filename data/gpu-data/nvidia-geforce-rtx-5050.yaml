summary: |
  The NVIDIA GeForce RTX 5050 is an entry-level graphics card released on July 1, 2025,
  featuring the Blackwell architecture based on the GB207 GPU die. It offers 2,560 CUDA cores
  across 20 streaming multiprocessors, 80 5th-generation tensor cores, and 8GB of GDDR6 memory
  running at 20 Gbps, delivering approximately 105 AI TOPS for dense INT8 workloads. As the
  most affordable desktop Blackwell GPU, the RTX 5050 brings DLSS 4 with Multi-Frame Generation
  support to the entry-level segment—a first for a desktop xx50-series GPU. The card provides
  capable 1080p gaming performance with a TDP of only 130W on a 128-bit memory bus delivering
  320 GB/s of bandwidth. Unlike higher-tier RTX 50 series cards, it uses GDDR6 (not GDDR7)
  memory. The RTX 5050 supports 4th-generation ray tracing cores, PCI-Express 5.0 x8,
  DisplayPort 2.1b, and HDMI 2.1b outputs. All retail cards are manufactured by AIB partners;
  no Founders Edition was released.

