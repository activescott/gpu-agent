summary: >-
  The AMD Instinct MI350X is AMD's first CDNA 4 architecture AI and HPC
  datacenter accelerator, launched on June 12, 2025 at the AMD Advancing AI
  2025 event in San Jose, California. It uses a multi-chiplet design with 8
  Accelerator Complex Dies (XCDs) manufactured on TSMC N3P (3 nm) plus 2 I/O
  dies on TSMC 6 nm, totaling 185 billion transistors across the package. The
  MI350X delivers 256 CDNA 4 compute units (32 CUs per XCD), 16,384 stream
  processors, and 1,024 Matrix Cores, with native hardware support for FP4,
  FP6, FP8, FP16, BF16, FP32, FP64, and INT8 precisions. The defining features of CDNA 4 include redesigned
  matrix-core engines that add native MXFP4 and MXFP6 (microscaling)
  throughput, enabling 9.2 PFLOPS of peak FP4/MXFP4 performance per
  accelerator - a major generational leap for low-precision AI inference.
  FP16/BF16 matrix dense performance is 2.3 PFLOPS (4.6 PFLOPS with 2:4
  structured sparsity), FP8 dense is 4.6 PFLOPS, and INT8 dense is 4.6 POPS.
  FP32 and FP64 vector performance are 144.2 and 72.1 TFLOPS respectively. The
  MI350X is equipped with 288 GB of 12-high HBM3E memory (supplied by Samsung
  and Micron) via an 8,192-bit interface at 8 GHz, delivering 8 TB/s (8,000
  GB/s) of peak memory bandwidth - a 33% improvement over the MI325X. At 1,000W
  TBP, it is the air-cooled variant of the CDNA 4 family; the MI355X (1,400W,
  liquid-cooled) achieves higher performance through higher clock speeds with
  the same die and memory configuration. The MI350X uses the OAM (OCP
  Accelerator Module) form factor with a PCIe 5.0 x16 host interface and 7
  fourth-generation Infinity Fabric links at approximately 153-160 GB/s each.
  Up to 8 MI350X OAMs mount on a Universal Base Board 2.0 (UBB 2.0) to form
  the AMD Instinct MI350X Platform with 2.3 TB aggregate HBM3E. AMD claims 4x
  AI compute improvement and 35x inference performance improvement versus the
  MI325X. The MI350X is packaged using TSMC CoWoS-S technology. Mass
  production and customer shipments were slated for Q3 2025.

