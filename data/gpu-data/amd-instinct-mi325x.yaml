summary: >-
  The AMD Instinct MI325X is AMD's Q4 2024 refresh of the MI300X, launched on
  October 10, 2024 at the AMD Advancing AI 2024 event. It uses the same CDNA 3
  multi-chiplet architecture and identical compute silicon as the MI300X — 8
  Accelerator Complex Dies (XCDs) on TSMC N5 and 4 I/O Dies on TSMC N6,
  totaling 153 billion transistors, 304 Compute Units, 19,456 Stream Processors,
  and 1,216 Matrix Cores. The sole hardware change relative to the MI300X is a
  memory upgrade from 192 GB HBM3 to 256 GB HBM3e, increasing peak memory
  bandwidth from 5.3 TB/s to 6.0 TB/s via an 8,192-bit memory interface clocked
  at 6 GHz. This 33% memory capacity increase and 13% bandwidth increase come
  with a higher TDP of 1,000W (up from 750W on the MI300X) due to the
  faster HBM3e stack speeds. Compute performance is identical to the MI300X:
  FP64 vector 81.7 TFLOPS, FP32/FP64 matrix 163.4 TFLOPS, FP16/BF16 dense
  1,307.4 TFLOPS (2,614.9 TFLOPS with 2:4 structured sparsity), FP8 dense
  2,614.9 TFLOPS, and INT8 dense 2,614.9 TOPS. The MI325X uses the OAM
  (OCP Accelerator Module) form factor with a PCIe 5.0 x16 host interface and
  8 Infinity Fabric links at 128 GB/s each. Up to 8 MI325X OAMs mount on a
  Universal Base Board (UBB) to form the AMD Instinct MI325X Platform, providing
  2 TB of aggregate HBM3e memory per node. AMD had originally announced the
  MI325X with 288 GB of HBM3e memory, but reduced the usable capacity to 256 GB
  at actual launch. OEM platforms include the HPE ProLiant Compute XD685 (5U,
  8-GPU), Supermicro H14 8U 8-GPU system, Gigabyte G893-ZX1-AAX2, and the
  Supermicro AS-4126GS-NMR-LCC (4U, 8-GPU with liquid cooling). The MI325X
  targets large language model inference workloads where its 256 GB memory
  capacity per accelerator provides a significant advantage over competing
  solutions for fitting large models.

