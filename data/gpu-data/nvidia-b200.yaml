summary: >-
  The NVIDIA B200 is the flagship Blackwell-architecture datacenter GPU
  accelerator, announced at NVIDIA GTC in March 2024 and entering volume
  production in Q4 2024. It is deployed in the HGX B200 and DGX B200 server
  platforms using the SXM6 socket. The B200 uses the same dual-chiplet GB100
  package as its sibling B100 — two reticle-sized dies on a single substrate
  totaling 208 billion transistors on TSMC custom 4NP process — but operates
  at higher clocks and 1000 W TDP (versus B100's 700 W), delivering
  substantially more compute throughput. It provides 180 GB of HBM3e memory
  on a dual 4096-bit memory bus (one sub-interface per die) at 7.7 TB/s aggregate
  bandwidth. Tensor Core performance reaches 9 PFLOPS FP4 dense (18 PFLOPS
  with 2:4 structured sparsity), 4.5 PFLOPS FP8/INT8 dense (9 PFLOPS sparse),
  and 2.25 PFLOPS FP16/BF16 dense (4.5 PFLOPS sparse). Peak TF32 Tensor Core
  performance is 1.1 PFLOPS dense (2.2 PFLOPS sparse). FP64 performance is
  37 TFLOPS. The B200 includes 5th-generation NVLink at 1.8 TB/s GPU-to-GPU
  bidirectional bandwidth, connecting up to 8 GPUs per HGX B200 baseboard for
  14.4 TB/s total NVLink bandwidth. Compute capability is 10.0 (sm_100),
  enabling access to Blackwell-specific CUDA features including 5th-generation
  Tensor Cores with native FP4 support, a second-generation Transformer Engine
  supporting FP8 and FP4 precision, NVLink 5, and PCIe 6.0. The B200 supports
  up to 7 Multi-Instance GPU (MIG) instances at 23 GB each. As the primary
  volume Blackwell datacenter GPU, the B200 is widely deployed in HGX
  configurations from Dell, Lenovo, Supermicro, and Gigabyte.

