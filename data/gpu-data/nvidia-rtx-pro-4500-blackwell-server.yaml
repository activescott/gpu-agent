summary: |
  The NVIDIA RTX PRO 4500 Blackwell Server Edition is a passively cooled, single-slot professional
  server GPU launched on March 17, 2026, built on the NVIDIA Blackwell architecture (GB203 die, TSMC
  4nm process) with 10,496 CUDA cores across 82 streaming multiprocessors, 328 fifth-generation Tensor
  Cores, and 82 fourth-generation RT Cores. It is the data center and edge server counterpart to the
  RTX PRO 4500 Blackwell Workstation Edition, sharing the same GPU silicon but optimized for deployment
  in 1U and 2U rack servers where passive cooling relies on chassis airflow.

  The card features 32 GB of GDDR7 ECC memory on a 256-bit memory bus providing 800 GB/s bandwidth.
  Compared to the workstation variant (896 GB/s, 200W), the server edition uses slower 25 Gbps GDDR7
  memory (versus 28 Gbps), resulting in the lower bandwidth and a reduced 165W TDP. The fifth-generation
  Tensor Cores deliver 1.6 PFLOPS FP4 (with 2:4 structured sparsity), 811 TFLOPS FP8, 406 TFLOPS FP16
  and BF16, and 203 TFLOPS TF32, supporting broad AI and machine learning workloads. The fourth-generation
  RT Cores provide hardware-accelerated ray tracing at 154 TFLOPS peak.

  The single-slot, full-height full-length (FHFL) passive form factor (4.4" H x 10.5" L) enables
  high-density server deployments. The card connects via PCIe 5.0 x16, requires one 16-pin PCIe CEM5
  power connector, and has no display outputs (headless, server-only design). Multi-Instance GPU (MIG)
  support allows partitioning into up to 2 MIG instances of 16 GB each. Video encode/decode engines
  include three ninth-generation NVENC encoders and three sixth-generation NVDEC decoders with 4:2:2
  support, enabling video transcoding workloads in server environments.

  The RTX PRO 4500 Blackwell Server Edition uses the GB203 die (same as the GeForce RTX 5080 and the
  RTX PRO 4500 Workstation Edition), with all 82 of the 84 SMs enabled. CUDA compute capability is 12.0
  (sm_120). OEM support includes Lenovo ThinkSystem SR665 V3, HPE ProLiant/Mainstream Compute platforms,
  Supermicro server platforms, and distribution through PNY.

