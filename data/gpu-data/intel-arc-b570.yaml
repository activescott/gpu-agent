notes:
  - 'FP32 TFLOPS of 11.52 calculated as 2,304 shading units × 2,500 MHz boost clock × 2 ops/cycle ÷ 1,000 = 11.52 TFLOPS, consistent with Intel official specifications and TechPowerUp GPU Database'
  - 'FP16 TFLOPS of 23.04 represents the 2:1 ratio to FP32 on Xe2-HPG architecture Xe Vector Engines, per TechPowerUp specifications'
  - 'int8TOPS of 203 represents non-sparse (dense) INT8 performance sourced from Intel official product specifications page (SKU 241676). Intel Arc architecture does not implement NVIDIA-style 2:4 structured sparsity; values are inherently dense. Dense value used for consistent cross-vendor comparison.'
  - 'tensorCoreCount of 144 refers to the XMX (Xe Matrix Extension) engines, Intel''s equivalent to NVIDIA tensor cores. Calculated as 18 Xe-cores × 8 XMX engines per Xe-core = 144 total XMX engines, per Intel Battlemage architecture documentation'
  - 'XMX engines support FP16, BF16, INT8, INT4, and INT2 data types for matrix operations via DPAS (Dot Product Accumulate Systolic) instruction'
  - 'FP32 and FP64 operations are handled by the Xe Vector Engines (XVEs), not the XMX units'
  - 'Memory bandwidth of 380 GB/s calculated as 160-bit interface ÷ 8 bits/byte × 19 Gbps = 380 GB/s, confirmed by Intel official specifications'
  - 'Built on TSMC N5 (5nm) process node, using the same BMG-G21 die as the Arc B580 but with 18 active Xe-cores (vs 20 on B580)'
  - 'The 160-bit memory bus (vs 192-bit on B580) results in lower memory bandwidth (380 GB/s vs 456 GB/s) but the 10GB GDDR6 VRAM capacity is competitive at the $219 price point'
  - 'TDP of 150W sourced from Intel official product specifications; lower than B580''s 190W due to fewer active Xe-cores'
  - 'Release date of January 16, 2025, per Intel Newsroom launch announcement. The B570 was announced at CES 2025 and launched shortly after the B580 (December 2024)'
  - 'MSRP of $219 USD sourced from Intel.com official product page at launch'
  - 'Intel SKU 241676 identified from Intel ARK product page URL'
  - 'ASRock Challenger part number 90-GA5KZZ-00UANF sourced from ASRock product listings'
  - 'Sparkle GUARDIAN OC model number SB570G-10GOC sourced from Newegg product listing. Note: Sparkle does not make a B570 TITAN variant (TITAN is B580-only)'
