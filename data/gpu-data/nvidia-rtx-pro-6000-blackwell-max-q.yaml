summary: |
  The NVIDIA RTX PRO 6000 Blackwell Max-Q Workstation Edition is the power-optimized variant of the
  flagship RTX PRO 6000 Blackwell professional GPU family, designed for compact workstations with
  constrained airflow and lower power budgets. It was announced at GTC25 Spring on March 18, 2025,
  alongside the full-power Workstation Edition (600 W) and Server Edition (up to 600 W).

  The Max-Q edition uses the identical full-configuration GB202 die as the 600 W Workstation Edition:
  24,064 CUDA cores across 188 streaming multiprocessors, 752 fifth-generation Tensor Cores, and
  188 fourth-generation RT Cores. The core count is the same highest-SM-count GB202 configuration
  (188 of 192 SMs), surpassing the consumer GeForce RTX 5090 (170 of 192 SMs). The fundamental
  difference is clock speed: the Max-Q boosts to approximately 2,280 MHz versus 2,617 MHz on the
  Workstation Edition, trading about 12% FP32 throughput (110 TFLOPS vs 125 TFLOPS) for a halved
  TDP of 300 W. Importantly, all 96 GB of GDDR7 ECC memory on the 512-bit bus, and its full
  1,792 GB/s memory bandwidth, are preserved identically between the two editions.

  The 5th-generation Tensor Cores deliver 3,511 AI TOPS (FP4 with 2:4 structured sparsity),
  supporting FP4, FP8, BF16, TF32, FP16, INT8, and INT4 precision formats. The reduced clock
  explains the proportional decrease in AI TOPS: 3,511 / 4,000 = 87.8%, matching the FP32 ratio
  of 110 / 125 = 88.0%. The card supports Multi-Instance GPU (MIG) with up to four fully isolated
  24 GB GPU instances, identical to the other editions.

  The form factor is 4.4 in H x 10.5 in L, dual-slot, full-height — the same height as the Server
  Edition (4.4 in) and shorter length than the Workstation Edition (12.0 in). Active (blower-style)
  cooling is used rather than passive cooling, allowing the Max-Q to target compact tower and
  small-form-factor workstations rather than rack servers. It connects via PCIe 5.0 x16, requires a
  single 16-pin PCIe CEM5 power connector for its 300 W TDP, and provides four DisplayPort 2.1b
  outputs. Video engine support includes four ninth-generation NVENC encoders and four
  sixth-generation NVDEC decoders. OEM workstation partners including Dell and HP have offered the
  Max-Q as a BTO option in Precision and Z-series workstations respectively. Distribution through
  PNY under SKUs VCNRTXPRO6000BQ-PB (retail) and VCNRTXPRO6000BQ-BLK (bulk).

