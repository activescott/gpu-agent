apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gpupoet-dev

resources:
  - namespace.yaml
  - ../../base

patches:
  - path: patch-app-development.yaml
    target:
      kind: Deployment
      name: app
  # Override ingress host for local development
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: gpupoet.local
      # Remove the /ops/revalidate-cache blocking rule for dev (allows manual testing)
      - op: remove
        path: /spec/rules/0/http/paths/0
    target:
      kind: Ingress
      name: gpupoet-app-ingress
  # Override storageClassName for minikube
  - patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: standard
    target:
      kind: StatefulSet
      name: db
  # Suspend cache revalidation CronJob in dev.
  # The local dev DB is typically a snapshot from ./scripts/restore-prod-db which
  # already contains fresh listings. If the cron runs against stale snapshot data,
  # every GPU appears stale and the job hits eBay's rate limit (429s).
  #
  # To get fresh listings in dev, either:
  #   1. Run ./scripts/restore-prod-db to restore a recent production snapshot
  #   2. Comment out this patch and restart ./scripts/dev to re-enable the cron
  #   3. Trigger a one-off revalidation manually:
  #      kubectl --context minikube create job --from=cronjob/cache-revalidation manual-revalidation -n gpupoet-dev
  - patch: |-
      - op: add
        path: /spec/suspend
        value: true
    target:
      kind: CronJob
      name: cache-revalidation
  # Remove IndexNow CronJob (not needed in dev)
  - patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: indexnow-notifier
    target:
      kind: CronJob
      name: indexnow-notifier
  # Remove IndexNow PVC (not needed in dev)
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: indexnow-pvc
    target:
      kind: PersistentVolumeClaim
      name: indexnow-pvc
  # Override imagePullPolicy for locally-built amazon-searcher image
  # and enable pretty logging in dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_PRETTY
          value: "true"
    target:
      kind: Deployment
      name: amazon-searcher
secretGenerator:
  - name: app-creds
    envs:
      - .env.dev.app
  - name: db-creds
    envs:
      - .env.dev.db

images:
  - name: gpupoet-image-app
    newName: gpupoet-dev
    newTag: latest
  - name: gpupoet-image-db
    newName: postgres
    newTag: "15-alpine"
  - name: amazon-searcher-image-placeholder
    newName: amazon-searcher-dev
    newTag: latest
