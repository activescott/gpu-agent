summary: |
  The NVIDIA RTX PRO 4000 Blackwell is a professional single-slot workstation GPU announced
  on March 18, 2025, built on the NVIDIA Blackwell architecture (GB203 die, TSMC 4nm process)
  with 8,960 CUDA cores across 70 streaming multiprocessors, 280 fifth-generation Tensor Cores,
  and 70 fourth-generation RT Cores. It is the successor to the RTX 4000 Ada Generation and
  is positioned as "the most advanced single-slot GPU for professionals," delivering 40 TFLOPS
  of single-precision FP32 compute and 1,290 AI TOPS (theoretical FP4 with sparsity).

  The card features 24 GB of GDDR7 ECC memory on a 192-bit memory bus providing 672 GB/s
  bandwidth, a significant improvement over the predecessor's 20GB GDDR6 at 360 GB/s. The
  fifth-generation Tensor Cores introduce FP4 precision support alongside FP8, BF16, TF32,
  FP16, INT8, and INT4, enabling broader AI and machine learning workloads. The fourth-generation
  RT Cores double the ray-triangle intersection rate versus the prior generation.

  With a TDP of 145W in a single-slot, full-height form factor (4.4" H x 9.5" L), the RTX PRO
  4000 Blackwell requires one 16-pin power connector. It connects via PCIe 5.0 x16 and provides
  four DisplayPort 2.1b outputs supporting up to four independent displays at 4K 165 Hz or two
  displays at 8K 100 Hz. Video engine support includes one ninth-generation NVENC encoder and
  one sixth-generation NVDEC decoder.

  The RTX PRO 4000 Blackwell uses the same GB203 die as the GeForce RTX 5080 (which has all
  10,752 shaders enabled), but with 8,960 of the 10,752 shader processors active (70 of 84 SMs
  enabled). The GPU is distributed through PNY and available from workstation OEMs including
  BOXX, Dell, HP, and Lenovo.

